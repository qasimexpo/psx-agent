services:
  - type: web
    name: smartsarmaya-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL_NAME
        value: llama-3.1-8b-instant
      - key: DATABASE_URL
        sync: false

  - type: web
    name: smartsarmaya-web
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_ADSENSE_CLIENT
        sync: false

  - type: cron
    name: smartsarmaya-updater-tickers
    runtime: python
    rootDir: .
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_updater.py tickers
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL_NAME
        value: llama-3.1-8b-instant

  - type: cron
    name: smartsarmaya-updater-picks
    runtime: python
    rootDir: .
    # 06:00 UTC = 11:00 PKT — refresh all Top Halal Picks (10 sectors × daily/monthly/yearly)
    schedule: "0 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_updater.py top_picks
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_MODEL_NAME
        value: llama-3.1-8b-instant
